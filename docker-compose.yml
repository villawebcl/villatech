services:
  postgres:
    image: postgres:16
    container_name: villatech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: villatech
    ports:
      - "5432:5432"
    volumes:
      - villatech_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d villatech"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  villatech_postgres_data:
